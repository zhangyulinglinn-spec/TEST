function showQuestion() {
  const q = questions[currentQuestion];
  document.getElementById("progress").innerText =
    `第 ${currentQuestion + 1} 题 / 共 ${questions.length} 题`;
  document.getElementById("question").innerText = q.text;
}

function answerQuestion(value) {
  const q = questions[currentQuestion];

  // 反向题计分：1->5, 2->4, 3->3, 4->2, 5->1
  let finalValue = q.reverse ? 6 - value : value;

  // 把分数加到对应维度
  scores[q.dim] += finalValue;

  currentQuestion++;

  if (currentQuestion < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function manhattanDistance(userScoresArray, prototypeArray) {
  let total = 0;
  for (let i = 0; i < userScoresArray.length; i++) {
    total += Math.abs(userScoresArray[i] - prototypeArray[i]);
  }
  return total;
}

function calculateTypes() {
  const userScoresArray = [
    scores.H,
    scores.E,
    scores.X,
    scores.A,
    scores.C,
    scores.O
  ];

  const results = Object.entries(prototypes).map(([name, prototypeArray]) => {
    return {
      name: name,
      distance: manhattanDistance(userScoresArray, prototypeArray)
    };
  });

  results.sort((a, b) => a.distance - b.distance);

  return {
    mainType: results[0],
    subType: results[1]
  };
}

function showResult() {
  document.getElementById("quiz").classList.add("hidden");

  const resultDiv = document.getElementById("result");
  resultDiv.classList.remove("hidden");

  const typeResults = calculateTypes();

  const mainName = typeResults.mainType.name;
  const subName = typeResults.subType.name;

  const mainDesc = typeDescriptions[mainName];
  const subDesc = typeDescriptions[subName];

  resultDiv.innerHTML = `
    <h2>测试完成</h2>

    <h3>主型：${mainName}</h3>
    <p><strong>${mainDesc.title}</strong></p>
    <p>${mainDesc.text}</p>

    <hr>

    <h3>副型：${subName}</h3>
    <p><strong>${subDesc.title}</strong></p>
    <p>${subDesc.text}</p>
  `;
}

showQuestion();
